<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Baseline Monitor</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
:root{
  --bg:#f5f7fb;
  --card:#fff;
  --border:#e6e8ef;
  --ok:#12b76a;
  --warn:#f79009;
  --bad:#f04438;
  --text:#111827;
  --muted:#667085;
  --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas;
}
body{margin:0;background:var(--bg);font-family:system-ui;color:var(--text)}
header{padding:18px 20px;display:flex;justify-content:space-between;align-items:center}
h1{margin:0;font-size:16px}
.container{display:grid;grid-template-columns:340px 1fr;gap:16px;padding:0 20px 20px}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px}
button{cursor:pointer;border:1px solid var(--border);padding:8px 12px;border-radius:10px;background:#fff}
button.primary{background:#2563eb;color:#fff;border-color:#2563eb}
input[type=file]{font-size:12px}
.tree details{margin-bottom:10px;border:1px solid var(--border);border-radius:12px;overflow:hidden}
summary{cursor:pointer;padding:8px 12px;display:flex;justify-content:space-between;align-items:center}
.children{padding:8px 14px 12px;background:#fafbff}
.task{display:flex;justify-content:space-between;padding:6px 0}
.pct{font-family:var(--mono);padding:3px 8px;border-radius:999px;border:1px solid var(--border)}
.pct.ok{background:rgba(18,183,106,.08);border-color:rgba(18,183,106,.2)}
.pct.warn{background:rgba(247,144,9,.08);border-color:rgba(247,144,9,.2)}
.pct.bad{background:rgba(240,68,56,.08);border-color:rgba(240,68,56,.2)}
.status{font-size:11px;margin-left:8px}
small{color:var(--muted)}
.meta{font-size:12px;color:var(--muted)}
</style>
</head>

<body>

<header>
  <h1>Baseline Monitor</h1>
  <div class="meta" id="meta">Sin datos</div>
</header>

<div class="container">

  <!-- SIDEBAR -->
  <div class="card">
    <div>
      <strong>1. Baseline (JSON)</strong><br>
      <input type="file" id="baselineInput" accept=".json"/>
    </div>
    <br>
    <div>
      <strong>2. Run Log (XLSX/JSON)</strong><br>
      <input type="file" id="logInput" accept=".xlsx,.xls,.json"/>
    </div>
    <br>
    <button class="primary" id="applyBtn">Generar</button>
    <button id="clearBtn">Limpiar</button>
  </div>

  <!-- MAIN -->
  <div class="card">
    <div class="tree" id="tree"></div>
  </div>

</div>

<script>
let BASELINE = [];
let RUNLOG = [];
let MERGED = [];

function $(id){ return document.getElementById(id); }

function classify(p){
  if(p>80) return "ok";
  if(p>=50) return "warn";
  return "bad";
}

function pct1(n){ return Math.floor((n||0)*10)/10 }

function statusLabel(p){
  if(p>80) return "OK";
  if(p>=50) return "EN CURSO";
  return "CRÍTICO";
}

function parseBaseline(obj){
  const base = obj.baseline || obj;
  const flat = [];
  const folder = base.folder || "—";

  for(const blk of base.blocks||[]){
    for(const sb of blk.subblocks||[]){
      for(const t of sb.tasks||[]){
        flat.push({
          folder,
          block: blk.name,
          subblock: sb.name,
          task: t.task,
          task_key: t.task_key,
          type: t.type||"",
          from: t.from||"",
          to: t.to||"",
          order: t.order||0
        });
      }
    }
  }
  return flat.sort((a,b)=>a.order-b.order);
}

async function parseLog(file){
  if(file.name.toLowerCase().endsWith(".json")){
    const txt = await file.text();
    return JSON.parse(txt).tasks||[];
  }
  const buf = await file.arrayBuffer();
  const wb = XLSX.read(buf,{type:"array"});
  const ws = wb.Sheets[wb.SheetNames[0]];
  return XLSX.utils.sheet_to_json(ws,{defval:""});
}

function merge(){
  MERGED = BASELINE.map(bt=>{
    const match = RUNLOG.find(r=>{
      return (r.TASK_KEY && r.TASK_KEY===bt.task_key)
    });

    if(!match){
      return {...bt, pct:0, exec:false};
    }

    const p = pct1(Number(match["%"]||match.progress||0));
    return {...bt, pct:p, exec:true};
  });
}

function aggregate(items){
  const exec = items.filter(x=>x.exec);
  if(exec.length===0) return 0;
  return pct1(exec.reduce((s,x)=>s+x.pct,0)/exec.length);
}

function render(){
  const tree = $("tree");
  tree.innerHTML = "";

  const blocks = {};

  for(const t of MERGED){
    if(!blocks[t.block]) blocks[t.block]={};
    if(!blocks[t.block][t.subblock]) blocks[t.block][t.subblock]=[];
    blocks[t.block][t.subblock].push(t);
  }

  for(const block in blocks){
    const allTasks = Object.values(blocks[block]).flat();
    const bp = aggregate(allTasks);
    const bcls = classify(bp);

    const bDet = document.createElement("details");
    bDet.innerHTML = `
      <summary>
        <div>${block}</div>
        <div class="pct ${bcls}">${bp.toFixed(1)}%</div>
      </summary>
      <div class="children"></div>
    `;

    const bChild = bDet.querySelector(".children");

    for(const sub in blocks[block]){
      const sp = aggregate(blocks[block][sub]);
      const scls = classify(sp);

      const sDet = document.createElement("details");
      sDet.innerHTML = `
        <summary>
          <div>${sub}</div>
          <div class="pct ${scls}">${sp.toFixed(1)}%</div>
        </summary>
        <div class="children"></div>
      `;

      const sChild = sDet.querySelector(".children");

      for(const t of blocks[block][sub]){
        const cls = classify(t.pct);
        const div = document.createElement("div");
        div.className="task";
        div.innerHTML = `
          <div>
            ${t.task}
            <span class="status">${statusLabel(t.pct)}</span>
          </div>
          <div class="pct ${cls}">${t.pct.toFixed(1)}%</div>
        `;
        sChild.appendChild(div);
      }

      bChild.appendChild(sDet);
    }

    tree.appendChild(bDet);
  }

  $("meta").textContent = `${BASELINE.length} tareas baseline · ${RUNLOG.length} filas log`;
}

$("baselineInput").addEventListener("change", async e=>{
  const file = e.target.files[0];
  if(!file) return;
  const txt = await file.text();
  BASELINE = parseBaseline(JSON.parse(txt));
});

$("logInput").addEventListener("change", async e=>{
  const file = e.target.files[0];
  if(!file) return;
  RUNLOG = await parseLog(file);
});

$("applyBtn").addEventListener("click", ()=>{
  if(!BASELINE.length){
    alert("Cargá baseline primero");
    return;
  }
  merge();
  render();
});

$("clearBtn").addEventListener("click", ()=>{
  BASELINE=[]; RUNLOG=[]; MERGED=[];
  $("tree").innerHTML="";
  $("meta").textContent="Sin datos";
});
</script>
</body>
</html>
